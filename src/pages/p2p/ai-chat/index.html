<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="peersky://static/assets/favicon.ico" />
    <title>AI Chat</title>
    <style>
      @import url("browser://theme/vars.css");

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --surface-mix: var(--browser-theme-background);
        --chat-bg:   var(--browser-theme-background);
        --list-bg:   var(--peersky-nav-background, var(--base02, var(--browser-theme-background)));
        --popup-bg:  var(--list-bg);
        --header-bg: var(--peersky-background-url-input, var(--base01, var(--browser-theme-background)));
        --input-bg:  var(--peersky-background-url-input, var(--base01, var(--browser-theme-background)));
        --border:    var(--base04, color-mix(in srgb, var(--browser-theme-text-color) 22%, var(--surface-mix)));
        --text:      var(--browser-theme-text-color);
        --muted:     var(--base05, color-mix(in srgb, var(--browser-theme-text-color) 58%, var(--surface-mix)));
        --accent:    var(--browser-theme-primary-highlight);
        --msg-other: var(--base02, color-mix(in srgb, var(--browser-theme-text-color) 10%, var(--surface-mix)));
        --msg-self:  color-mix(in srgb, var(--browser-theme-primary-highlight) 30%, var(--surface-mix));
        --hover:     var(--base03, color-mix(in srgb, var(--browser-theme-text-color) 9%, var(--surface-mix)));
        --danger:    var(--settings-danger-color-hover, #c62828);
        --font:      var(--browser-theme-font-family, system-ui, -apple-system, sans-serif);
      }

      html, body { width: 100%; height: 100%; background: var(--chat-bg); font-family: var(--font); color: var(--text); overflow: hidden; }

      #app { display: flex; height: 100vh; width: 100%; }

      /* ── Sidebar ── */
      #sidebar {
        width: 280px; min-width: 260px; flex-shrink: 0;
        background: var(--list-bg);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
      }
      #sidebar-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      }
      #sidebar-title { font-size: 0.9rem; font-weight: 600; }
      #new-chat-btn {
        all: unset; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        padding: 4px; border-radius: 50%;
      }
      #new-chat-btn img { width: 18px; height: 18px; filter: invert(50%); transition: filter 0.15s; }
      #new-chat-btn:hover img { filter: invert(90%); }

      #history-list { flex: 1; overflow-y: auto; padding: 4px 0; }
      #history-list::-webkit-scrollbar { width: 4px; }
      #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .history-item {
        display: flex; align-items: center; gap: 0.4rem;
        padding: 0.6rem 0.75rem; cursor: pointer; position: relative;
        transition: background 0.15s;
      }
      .history-item:hover { background: var(--hover); }
      .history-item.active { background: var(--hover); border-left: 3px solid var(--accent); padding-left: calc(0.75rem - 3px); }
      .history-item-info { flex: 1; min-width: 0; }
      .history-item-title {
        font-size: 0.82rem; font-weight: 500; color: var(--text);
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      }
      .history-item.pinned .history-item-title::before { content: '\1F4CC\00A0'; font-size: 10px; }
      .history-item.generating .history-item-title::after {
        content: ''; display: inline-block; width: 6px; height: 6px;
        background: var(--accent); border-radius: 50%; margin-left: 6px;
        vertical-align: middle; animation: gen-pulse 1s ease-in-out infinite;
      }
      @keyframes gen-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
      .history-item-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
      .history-item-dots {
        all: unset; cursor: pointer;
        display: none; align-items: center; justify-content: center;
        padding: 3px 4px; border-radius: 4px; flex-shrink: 0;
      }
      .history-item:hover .history-item-dots { display: flex; }
      .history-item-dots:hover { background: var(--border); }
      .history-item-dots img { width: 14px; height: 14px; filter: invert(50%); pointer-events: none; }
      .history-empty { padding: 1rem 0.75rem; font-size: 0.8rem; color: var(--muted); text-align: center; line-height: 1.6; }
      .history-empty a { color: var(--accent); text-decoration: none; }
      .history-empty a:hover { text-decoration: underline; }

      .chat-footer {
        flex-shrink: 0; padding: 0.5rem 0.75rem 0.6rem;
        border-top: 1px solid var(--border); font-size: 0.75rem;
      }
      .chat-footer a { color: var(--muted); text-decoration: none; }
      .chat-footer a:hover { color: var(--accent); }
      #print-footer { display: none; }

      /* ── Chat panel ── */
      #chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--chat-bg); }

      #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; background: var(--chat-bg); }
      #messages::-webkit-scrollbar { width: 5px; }
      #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      #welcome {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px;
        padding: 2rem; text-align: center;
      }
      #welcome h2 { font-size: 1.25rem; color: var(--text); }
      #welcome p  { font-size: 0.85rem; color: var(--muted); max-width: 320px; line-height: 1.6; }
      #welcome a  { color: var(--accent); text-decoration: none; }
      #welcome a:hover { text-decoration: underline; }

      /* ── Messages ── */
      .message {
        display: flex; flex-direction: column; max-width: 72%; line-height: 1.4;
        animation: msgSlide 0.2s ease-out;
        position: relative; padding-bottom: 28px;
      }
      @keyframes msgSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .message.msg-user      { margin-left: auto;  align-items: flex-end; }
      .message.msg-assistant { margin-right: auto; align-items: flex-start; }
      .msg-role { font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 3px; }

      .msg-bubble {
        padding: 0.55rem 0.85rem; border-radius: 16px;
        word-wrap: break-word; word-break: break-word;
        font-size: 0.9rem; max-width: 100%; white-space: pre-wrap;
      }
      .message.msg-user      .msg-bubble { background: var(--msg-self);  border-top-right-radius: 4px; }
      .message.msg-assistant .msg-bubble { background: var(--msg-other); border-top-left-radius: 4px; }
      .msg-bubble img { max-width: 260px; max-height: 200px; border-radius: 8px; display: block; margin-top: 6px; }
      .msg-thinking { color: var(--muted); font-style: italic; }

      .msg-actions {
        position: absolute; bottom: 2px;
        display: flex; flex-direction: row; gap: 3px;
        opacity: 0; pointer-events: none; transition: opacity 0.12s;
      }
      .message:hover .msg-actions { opacity: 1; pointer-events: auto; }
      .message.msg-user      .msg-actions { right: 0; }
      .message.msg-assistant .msg-actions { left: 0; }
      .msg-action-btn {
        all: unset; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--popup-bg);
        transition: background 0.12s;
      }
      .msg-action-btn:hover { background: var(--hover); }
      .msg-action-btn img { width: 13px; height: 13px; filter: invert(50%); }
      .msg-action-btn:hover img { filter: invert(75%); }

      .msg-edit-area { display: none; flex-direction: column; gap: 5px; margin-top: 5px; width: 100%; }
      .msg-edit-area.open { display: flex; }
      .msg-edit-textarea {
        width: 100%; resize: none; padding: 7px 10px; border-radius: 8px;
        border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
        font-family: var(--font); font-size: 0.88rem; line-height: 1.4; min-height: 56px;
      }
      .msg-edit-textarea:focus { outline: none; border-color: var(--accent); }
      .msg-edit-btns { display: flex; gap: 5px; justify-content: flex-end; }
      .msg-edit-send, .msg-edit-cancel {
        font-size: 0.78rem; padding: 0.28rem 0.65rem; border-radius: 6px; cursor: pointer; border: none;
      }
      .msg-edit-send   { background: var(--accent); color: #fff; }
      .msg-edit-send:hover { filter: brightness(1.1); }
      .msg-edit-cancel { background: var(--border); color: var(--text); }
      .msg-edit-cancel:hover { background: var(--hover); }

      /* ── Input form ── */
      #message-form {
        display: flex; flex-direction: row; align-items: flex-end; gap: 0.5rem;
        padding: 0.5rem 1rem; background: var(--header-bg); border-top: 1px solid var(--border); position: relative;
      }
      #attach-btn {
        all: unset; cursor: pointer; box-sizing: border-box;
        display: none; align-items: center; justify-content: center;
        width: 34px; height: 34px; flex-shrink: 0; align-self: center;
        border-radius: 50%; border: 1px solid var(--border); transition: background 0.15s;
      }
      #attach-btn.visible { display: flex; }
      #attach-btn:hover { background: var(--hover); }
      #attach-btn img { width: 18px; height: 18px; filter: invert(50%); }

      #prompt-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
      #attachment-preview { display: none; position: relative; width: fit-content; }
      #attach-thumb { max-width: 90px; max-height: 65px; border-radius: 6px; border: 1px solid var(--border); }
      #attach-remove {
        position: absolute; top: -5px; right: -5px; all: unset; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        width: 15px; height: 15px; border-radius: 50%; background: var(--danger); color: #fff; font-size: 10px;
      }

      #promptBox {
        flex: 1; resize: none; padding: 0.5rem 0.75rem; border-radius: 8px;
        border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
        font-family: var(--font); font-size: 0.9rem; min-height: 2.4rem; max-height: 8rem; overflow-y: auto; line-height: 1.4;
      }
      #promptBox:focus-visible { outline: none; border-color: var(--accent); }
      #promptBox::placeholder { color: var(--muted); }

      #send-btn {
        all: unset; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        width: 34px; height: 34px; flex-shrink: 0; align-self: center;
        border-radius: 50%; background: var(--accent); transition: filter 0.15s;
      }
      #send-btn:hover { filter: brightness(1.1); }
      #send-btn.busy  { background: var(--border); }
      #send-btn img   { width: 18px; height: 18px; filter: brightness(0) invert(1); }
      #send-btn.busy img { filter: invert(50%); }

      #drop-overlay {
        position: fixed; inset: 0; z-index: 100; display: none;
        align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--accent) 14%, var(--surface-mix));
        border: 2px dashed var(--accent); border-radius: 8px;
        color: var(--accent); font-size: 1.1rem; font-weight: 500; pointer-events: none;
      }
      #drop-overlay.visible { display: flex; }

      /* ── Context menu ── */
      .ctx-menu {
        display: none; position: fixed;
        background: var(--popup-bg); border: 1px solid var(--border);
        border-radius: 8px; padding: 4px; z-index: 200; min-width: 120px;
        box-shadow: 0 3px 14px rgba(0,0,0,0.25);
      }
      .ctx-menu.open { display: flex; flex-direction: column; }
      .ctx-menu button {
        all: unset; cursor: pointer; display: block; width: 100%; box-sizing: border-box;
        padding: 0.38rem 0.75rem; border-radius: 4px; font-size: 0.82rem; color: var(--text); text-align: left;
      }
      .ctx-menu button:hover { background: var(--hover); }
      .ctx-menu button.danger { color: var(--danger); }

      /* ── Delete modal ── */
      .modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
        z-index: 300; align-items: center; justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal-box {
        background: var(--popup-bg); border: 1px solid var(--border);
        border-radius: 12px; padding: 1.5rem; max-width: 340px; width: 90%;
        display: flex; flex-direction: column; gap: 0.7rem;
      }
      .modal-box h4 { font-size: 1rem; }
      .modal-box p  { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.25rem; }
      .modal-actions button { font-size: 0.82rem; padding: 0.38rem 0.8rem; border-radius: 6px; cursor: pointer; border: none; }
      .btn-cancel { background: var(--border); color: var(--text); }
      .btn-cancel:hover { background: var(--hover); }
      .btn-danger { background: var(--danger); color: #fff; }
      .btn-danger:hover { filter: brightness(1.1); }

      button:focus-visible { outline: 1px solid var(--accent); outline-offset: 1px; }

      /* ── Chat header ── */
      #chat-header {
        display: flex; align-items: center; justify-content: flex-end;
        padding: 0.4rem 1rem; background: var(--header-bg); border-bottom: 1px solid var(--border);
        min-height: 38px;
      }
      #pdf-btn {
        all: unset; cursor: pointer;
        display: flex; align-items: center; gap: 4px;
        padding: 4px 10px; border-radius: 6px; font-size: 0.78rem;
        color: var(--muted); border: 1px solid var(--border); transition: background 0.12s;
      }
      #pdf-btn:hover { background: var(--hover); color: var(--text); }
      #pdf-btn img { width: 14px; height: 14px; filter: invert(50%); }

      /* ── History search ── */
      #history-search-wrap { padding: 6px 8px; border-bottom: 1px solid var(--border); }
      #history-search {
        width: 100%; padding: 5px 10px; border-radius: 6px; box-sizing: border-box;
        border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
        font-family: var(--font); font-size: 0.82rem;
      }
      #history-search:focus { outline: none; border-color: var(--accent); }
      #history-search::placeholder { color: var(--muted); }

      /* ── Rename modal input ── */
      .rename-field {
        width: 100%; padding: 7px 10px; border-radius: 8px; box-sizing: border-box;
        border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
        font-family: var(--font); font-size: 0.9rem;
      }
      .rename-field:focus { outline: none; border-color: var(--accent); }

      /* ── Print (fallback if peersky IPC unavailable) ── */
      @media print {
        @page { margin: 1.5cm 1.5cm 2cm; size: A4; }
        #sidebar, #message-form, .msg-actions, .msg-edit-area, #drop-overlay,
        #chat-ctx-menu, .modal-overlay, #chat-header, .chat-footer { display: none !important; }
        html, body { overflow: visible; height: auto; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        #app { display: block; }
        #messages { display: block; overflow: visible; padding: 1rem; }
        .message { padding-bottom: 0; break-inside: avoid; max-width: 100%; animation: none !important; }
        .msg-bubble { break-inside: avoid; white-space: pre-wrap; }
        * {
          -webkit-user-select: text !important; user-select: text !important;
          animation: none !important; transition: none !important;
          -webkit-transform: none !important; transform: none !important;
        }
        #print-footer {
          display: block !important;
          position: fixed; bottom: 0; left: 0; right: 0;
          text-align: center; font-size: 8pt; color: var(--muted);
          padding: 6px; border-top: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-header">
          <span id="sidebar-title">AI Chat</span>
          <button id="new-chat-btn" title="New chat"><img src="./assets/svg/plus.svg" alt="New chat" /></button>
        </div>
        <div id="history-search-wrap">
          <input id="history-search" type="search" placeholder="Search chats&#x2026;" autocomplete="off" />
        </div>
        <div id="history-list"></div>
        <footer class="chat-footer">
          <a href="https://github.com/p2plabsxyz/ai-chat" target="_blank" rel="noopener noreferrer">Source</a>
        </footer>
      </aside>

      <section id="chat-panel">
        <div id="chat-header">
          <button type="button" id="pdf-btn" title="Export to PDF">
            <img src="./assets/svg/filetype-pdf.svg" alt="" />Export PDF
          </button>
        </div>
        <div id="messages" aria-live="polite"></div>
        <form id="message-form" onsubmit="return false">
          <input type="file" id="file-input" accept="image/*" style="display:none" />
          <button type="button" id="attach-btn" title="Attach image">
            <img src="./assets/svg/plus.svg" alt="Attach" />
          </button>
          <div id="prompt-wrap">
            <div id="attachment-preview">
              <img id="attach-thumb" alt="" />
              <button type="button" id="attach-remove" title="Remove">&#x2715;</button>
            </div>
            <textarea id="promptBox" rows="1" placeholder="Message PeerSky AI&#x2026;"></textarea>
          </div>
          <button type="button" id="send-btn" title="Send (Enter)">
            <img id="send-icon" src="./assets/svg/arrow-up.svg" alt="Send" />
          </button>
        </form>
      </section>
    </div>

    <div id="drop-overlay">Drop image here</div>

    <div id="chat-ctx-menu" class="ctx-menu">
      <button id="ctx-pin">Pin</button>
      <button id="ctx-rename">Rename</button>
      <button id="ctx-delete" class="danger">Delete</button>
    </div>

    <div id="rename-modal" class="modal-overlay">
      <div class="modal-box">
        <h4>Rename chat</h4>
        <input id="rename-input" class="rename-field" type="text" placeholder="Chat name…" autocomplete="off" />
        <div class="modal-actions">
          <button class="btn-cancel" id="rename-cancel">Cancel</button>
          <button id="rename-save" style="background:var(--accent);color:#fff;font-size:0.82rem;padding:0.38rem 0.8rem;border-radius:6px;cursor:pointer;border:none;">Save</button>
        </div>
      </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
      <div class="modal-box">
        <h4>Delete chat?</h4>
        <p>This will permanently delete this chat from local memory. This cannot be undone.</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="delete-cancel">Cancel</button>
          <button class="btn-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>

    <script type="module" src="./llm-chat.js"></script>
    <div id="print-footer">Created by PeerSky AI &middot; peersky://ai-chat</div>
  </body>
</html>
